[pytest]
testpaths = tests aii_server/tests aii_launcher/tests aii_lib/tests
# ``-n 2`` (was ``-n auto``): each xdist worker imports Django + DBOS +
# agent backends — per-worker RSS is ~3-4 GB. ``auto`` on a 10-core box
# pushes total resident set past 30 GB and freezes the desktop. Two
# workers cuts wall time roughly in half vs serial while leaving the
# box usable. Override with ``-n N`` on the command line for hot-path
# debugging.
addopts = --tb=short --no-header -q -m "not integration and not speed_check" -n 2 --continue-on-collection-errors
markers =
    unit: pure unit tests (no network)
    integration: heavy / subprocess / network tests (skipped by default)
    speed_check: opt-in suite-speed guard — run via `pytest -m speed_check`
filterwarnings =
    ignore:Pydantic serializer warnings:UserWarning
